name: Bandit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (Python security)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: pip install "bandit[sarif]"
      # Skip B110/B112 (try-except-pass): PickySteve uses deliberate fail-safe fallbacks.
      - run: bandit -r pickysteve -s B110,B112 -f sarif -o bandit.sarif --exit-zero
      - uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        if: always()
        with:
          sarif_file: bandit.sarif
