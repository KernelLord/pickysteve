name: Bandit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # weekly, Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    name: Bandit (Python security)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install "bandit[sarif]"

      - name: Run Bandit
        # Do not fail the job on findings; surface them in code scanning instead.
        # Skip B110/B112 (try-except-pass / try-except-continue): PickySteve uses deliberate
        # fail-safe fallbacks (the gate fails closed, cache and log writes are best-effort), so
        # these are by-design here, not defects.
        run: bandit -r pickysteve -s B110,B112 -f sarif -o bandit.sarif --exit-zero

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit.sarif
